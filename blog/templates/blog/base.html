<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>
      {% block title %}Blog App{% endblock title %}
   </title>
   {% load static %}
   <!-- Import Outfit or Inter font for a premium look -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.3">
</head>
<body>
   <header class="navbar">
      <div class="nav-container">
         <a href="{% url 'home' %}" class="logo">Ink<span>Spire</span></a>
         <nav class="nav-links">
            <a href="{% url 'home' %}" class="nav-item">Feed</a>
            {% if user.is_authenticated %}
               <a href="{% url 'create_post' %}" class="nav-item">New Post</a>
               <a href="{% url 'profile' user.username %}" class="nav-item">Profile</a>
               <span class="user-greeting">Hi, <strong>{{ user.username }}</strong></span>
               <a href="{% url 'logout' %}" class="nav-item btn btn-outline btn-sm">Logout</a>
            {% else %}
               <a href="{% url 'register' %}" class="nav-item">Register</a>
               <a href="{% url 'login' %}" class="nav-item btn btn-primary btn-sm">Login</a>
            {% endif %}
         </nav>
      </div>
   </header>

   <main class="container">
      {% block content %}
      {% endblock content %}
   </main>

   <footer class="footer">
      <div class="container">
         <p>&copy; 2026 InkSpire Blog. Crafted with passion.</p>
      </div>
   </footer>
</body>
</html>
